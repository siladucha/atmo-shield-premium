name: atmo_shield_premium
description: ATMO Shield Premium - Proactive stress monitoring with NeuroYoga integration
version: 1.5.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management (MVP)
  provider: ^6.1.1
  
  # Local Storage (MVP - plain SQLite, no encryption)
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  
  # Camera (MVP - camera plugin only)
  camera: ^0.10.6
  
  # UI & Utilities (MVP)
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  
  # Development
  flutter_lints: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
  
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700